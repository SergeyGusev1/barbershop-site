name: Fix nginx configs

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Restore nginx sites and fix placeforbeauty config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 193.164.150.235
          username: root
          password: ${{ secrets.SSH_PASS }}
          port: 22
          command_timeout: 5m
          script: |
            echo "=== Fix placeforbeauty nginx config (no default_server, IP-only) ==="
            sed -i 's/listen 80 default_server;/listen 80;/' /etc/nginx/sites-available/placeforbeauty
            sed -i 's/server_name _;/server_name 193.164.150.235;/' /etc/nginx/sites-available/placeforbeauty
            echo "--- placeforbeauty config after fix ---"
            cat /etc/nginx/sites-available/placeforbeauty

            echo "=== Re-enable all sites ==="
            for site in automir integra leadcrm; do
              if [ -f "/etc/nginx/sites-available/$site" ]; then
                ln -sf "/etc/nginx/sites-available/$site" "/etc/nginx/sites-enabled/$site"
                echo "Enabled: $site"
              fi
            done

            echo "=== sites-enabled ==="
            ls -la /etc/nginx/sites-enabled/

            echo "=== nginx -t ==="
            nginx -t

            echo "=== reload nginx ==="
            systemctl reload nginx

            echo "=== Check domains ==="
            curl -s -o /dev/null -w "193.164.150.235 (IP) -> HTTP %{http_code}\n" http://127.0.0.1/ -H "Host: 193.164.150.235"
            curl -s -o /dev/null -w "integradevelop.ru -> HTTP %{http_code}\n" http://127.0.0.1/ -H "Host: integradevelop.ru"
            curl -s -o /dev/null -w "integradevelop.online -> HTTP %{http_code}\n" http://127.0.0.1/ -H "Host: integradevelop.online"
            echo "=== Done ==="
